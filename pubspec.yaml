name: tusflores_app
description: "A new Flutter project for tusflores.app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  
  # State management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.2.0
  
  # Backend
  supabase_flutter: ^2.6.0
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Images
  image_picker: ^1.2.1
  
  # Deep links (WhatsApp)
  url_launcher: ^6.3.2
  
  # Print support
  printing: ^5.13.2
  pdf: ^3.11.1
  share_plus: ^12.0.1
  flutter_dotenv: ^6.0.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  image_gallery_saver: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
