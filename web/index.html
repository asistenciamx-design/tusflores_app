<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Default SEO -->
  <title>TusFlores.app — Florerías en México</title>
  <meta name="description" content="Descubre florerías cerca de ti. Arreglos florales, ramos, rosas y más. Ordena en línea con TusFlores.app">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TusFlores.app">
  <meta property="og:title" content="TusFlores.app — Florerías en México">
  <meta property="og:description" content="Descubre florerías cerca de ti y ordena en línea.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="TusFlores.app">
  <meta name="twitter:description" content="Florerías en México. Ordena en línea.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TusFlores">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!--
    SEO dinámico para páginas de tiendas (/mx/:slug).
    Actualiza <title>, <meta> y JSON-LD de LocalBusiness antes de que Flutter arranque.
    Google indexa el JSON-LD aunque sea inyectado por JS.
    La app Flutter actualiza el nodo #shop-jsonld con el rating real una vez cargado.
  -->
  <script>
    (function () {
      const path = window.location.pathname;
      const shopMatch = path.match(/^\/mx\/([^/]+)/);
      if (!shopMatch) return;

      const rawSlug = decodeURIComponent(shopMatch[1]);
      const shopName = rawSlug
        .replace(/-/g, ' ')
        .replace(/\b\w/g, function(c) { return c.toUpperCase(); });

      document.title = shopName + ' | TusFlores.app';

      function setMeta(sel, attr, val) {
        var el = document.querySelector(sel);
        if (el) el.setAttribute(attr, val);
      }
      setMeta('meta[name="description"]', 'content',
        'Florería ' + shopName + ' en TusFlores.app. Ordena arreglos florales, ramos y más en línea.');
      setMeta('meta[property="og:title"]', 'content', shopName + ' | TusFlores.app');
      setMeta('meta[property="og:description"]', 'content',
        'Florería ' + shopName + '. Ordena en línea con TusFlores.app');

      // JSON-LD — Google lo usa para mostrar estrellas en resultados de búsqueda.
      var script = document.createElement('script');
      script.type = 'application/ld+json';
      script.id = 'shop-jsonld';
      script.textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'LocalBusiness',
        'name': shopName,
        'url': window.location.origin + window.location.pathname,
        'image': window.location.origin + '/icons/Icon-512.png',
        'priceRange': '$$'
      });
      document.head.appendChild(script);
    })();

    // Función global llamada desde Flutter (dart:js) para actualizar
    // el JSON-LD con el rating real y conteo de reseñas.
    function updateShopJsonLd(shopName, ratingValue, reviewCount, city) {
      var el = document.getElementById('shop-jsonld');
      if (!el) return;
      var data = {
        '@context': 'https://schema.org',
        '@type': 'LocalBusiness',
        'name': shopName,
        'url': window.location.origin + window.location.pathname,
        'image': window.location.origin + '/icons/Icon-512.png',
        'priceRange': '$$'
      };
      if (city) data['address'] = { '@type': 'PostalAddress', 'addressLocality': city };
      if (reviewCount > 0) {
        data['aggregateRating'] = {
          '@type': 'AggregateRating',
          'ratingValue': ratingValue.toFixed(1),
          'reviewCount': reviewCount,
          'bestRating': '5',
          'worstRating': '1'
        };
      }
      el.textContent = JSON.stringify(data);
    }
  </script>
  <!-- ── Dynamic PWA manifest for shop pages (/mx/:slug) ──────────────────
       When a customer is on a florist page, we replace the static manifest
       link with an in-memory Blob manifest that has start_url set to the
       current shop URL. This way the installed PWA opens directly to the
       florist's page instead of the root landing/login.
  ──────────────────────────────────────────────────────────────────────── -->
  <script>
    (function () {
      var path = window.location.pathname;
      var shopMatch = path.match(/^\/mx\/([^/]+)/);
      if (!shopMatch) return; // florist dashboard — keep default manifest

      var rawSlug = decodeURIComponent(shopMatch[1]);
      var shopName = rawSlug
        .replace(/-/g, ' ')
        .replace(/\b\w/g, function (c) { return c.toUpperCase(); });

      var manifest = {
        name: shopName + ' | TusFlores',
        short_name: shopName,
        start_url: shopMatch[0],   // e.g. /mx/mercado-jamaica
        scope: '/',
        display: 'standalone',
        background_color: '#FFFFFF',
        theme_color: '#C2185B',
        orientation: 'portrait-primary',
        prefer_related_applications: false,
        icons: [
          { src: '/icons/Icon-192.png',          sizes: '192x192', type: 'image/png' },
          { src: '/icons/Icon-512.png',          sizes: '512x512', type: 'image/png' },
          { src: '/icons/Icon-maskable-192.png', sizes: '192x192', type: 'image/png', purpose: 'maskable' },
          { src: '/icons/Icon-maskable-512.png', sizes: '512x512', type: 'image/png', purpose: 'maskable' }
        ]
      };

      var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      var manifestEl = document.querySelector('link[rel="manifest"]');
      if (manifestEl) manifestEl.href = URL.createObjectURL(blob);
    })();
  </script>

  <!-- ── PWA install banner ─────────────────────────────────────────────────
       Intercepts beforeinstallprompt to replace the native browser banner
       with a branded one. Shows on every visit unless already installed
       (standalone display-mode). Dismissed only when user taps "Agregar"
       or the × button.
  ──────────────────────────────────────────────────────────────────────── -->
  <style>
    #pwa-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 99999;
      background: #fff;
      border-top: 3px solid #E91E8C;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.13);
      padding: 14px 16px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: pwa-slide-up 0.35s ease;
    }
    @keyframes pwa-slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #pwa-banner .pwa-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #pwa-banner .pwa-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    #pwa-banner .pwa-text {
      flex: 1;
      min-width: 0;
    }
    #pwa-banner .pwa-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A1A2E;
      margin: 0 0 2px;
    }
    #pwa-banner .pwa-subtitle {
      font-size: 12px;
      color: #888899;
      margin: 0;
    }
    #pwa-banner .pwa-btn {
      background: #E91E8C;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #pwa-banner .pwa-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 4px;
      flex-shrink: 0;
    }
  </style>

  <div id="pwa-banner" role="banner" aria-label="Agregar app">
    <div class="pwa-row">
      <img class="pwa-icon" src="icons/Icon-192.png" alt="TusFlores">
      <div class="pwa-text">
        <p class="pwa-title">TusFlores.app</p>
        <p class="pwa-subtitle">Agrega la app a tu pantalla de inicio</p>
      </div>
      <button class="pwa-btn" id="pwa-install-btn">Agregar app</button>
      <button class="pwa-close" id="pwa-close-btn" aria-label="Cerrar">×</button>
    </div>
  </div>

  <script>
    (function () {
      // Do not show if already running as installed PWA
      if (window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true) {
        return;
      }

      var deferredPrompt = null;
      var banner = document.getElementById('pwa-banner');

      function showBanner() {
        if (banner) banner.style.display = 'block';
      }

      function hideBanner() {
        if (banner) banner.style.display = 'none';
      }

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault(); // suppress native browser banner
        deferredPrompt = e;
        showBanner();
      });

      document.getElementById('pwa-install-btn').addEventListener('click', function () {
        hideBanner();
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function () {
            deferredPrompt = null;
          });
        }
      });

      document.getElementById('pwa-close-btn').addEventListener('click', function () {
        hideBanner();
      });

      // Hide banner if app gets installed while page is open
      window.addEventListener('appinstalled', function () {
        hideBanner();
        deferredPrompt = null;
      });
    })();
  </script>
</head>
<body>
  <!--
    Auto-reload when a new Service Worker takes control (new app version deployed).
    Without this, users on a cached page get a white screen after a new deploy
    because the old SW serves stale assets that no longer match the new index.html.
    The _tfRefreshing flag prevents infinite reload loops.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      var _tfRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!_tfRefreshing) {
          _tfRefreshing = true;
          window.location.reload();
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
